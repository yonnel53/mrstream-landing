<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. STREAM - Tecnología sin límites</title>
    <link rel="stylesheet" href="global.css">
    <style>
        html,
        body {
            min-width: 0;
            max-width: 100vw;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            max-width: 100vw;
            overflow-x: hidden;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
            background-color: #000; /* Fondo negro por si tarda en cargar la imagen */
            display: flex;
            justify-content: center;
            align-items: center;
                    position: relative;
        }
        .bg-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Mantiene la proporción de la imagen sin recortarla */
            max-width: 100%;
            max-height: 100%;
            background: rgba(15, 23, 42, 0.92);
            padding: 14px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
        }

        .hero-title {
            position: fixed;
            top: 42%;
            left: 50%;
            z-index: 1;
            width: min(92vw, 900px);
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: clamp(2.8rem, 8vw, 7rem);
            font-weight: 900;
            letter-spacing: 0.03em;
            line-height: 0.9;
            text-align: center;
            text-transform: uppercase;
            text-shadow: 0 4px 0 rgba(0, 0, 0, 0.3), 0 0 18px rgba(255, 255, 255, 0.35), 0 0 34px rgba(126, 255, 0, 0.45);
        }

        .hero-title strong {
            display: block;
            font-style: italic;
        }

        .hero-title span {
            display: block;
            margin-top: 14px;
            color: #d9ff70;
            font-size: clamp(0.8rem, 2vw, 1.5rem);
            font-style: normal;
            letter-spacing: 0.18em;
            line-height: 1;
        }

        .catalog-button {
            position: fixed;
            left: 50%;
            bottom: 188px;
            z-index: 2;
            transform: translateX(-50%);
            display: inline-block;
            padding: 18px 42px;
            border: 2px solid #b7ff3c;
            border-radius: 10px;
            background: rgba(3, 20, 8, 0.9);
            color: #ffffff;
            font-size: clamp(1.1rem, 2.2vw, 1.7rem);
            font-weight: 800;
            letter-spacing: 0.04em;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45), 0 0 20px rgba(126, 255, 0, 0.25);
            transition: background-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }

        .catalog-button:hover,
        .catalog-button:focus-visible {
            background: #1a991a;
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.5), 0 0 24px rgba(126, 255, 0, 0.45);
            transform: translateX(-50%) translateY(-2px);
        }

        .contact-panel {
            position: fixed;
            left: 50%;
            bottom: 28px;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transform: translateX(-50%);
            color: #f1ffe8;
            font-weight: 800;
            text-align: center;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);
        }

        .contact-title {
            font-size: 1.1rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .whatsapp-links {
            display: flex;
            gap: 12px;
        }

        .whatsapp-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 42px;
            padding: 9px 14px;
            border: 2px solid #b7ff3c;
            border-radius: 999px;
            background: rgba(3, 20, 8, 0.92);
            color: #ffffff;
            font-size: 0.9rem;
            text-decoration: none;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .whatsapp-link:hover,
        .whatsapp-link:focus-visible {
            background: #1a991a;
            transform: translateY(-2px);
        }

        .whatsapp-icon {
            display: inline-grid;
            width: 22px;
            height: 22px;
            place-items: center;
            border-radius: 50%;
            background: #25d366;
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: 900;
        }

        @media (max-width: 767px) {
            .catalog-button {
                width: calc(80% - 32px);
                bottom: 175px;
                padding: 16px 5px;
            }

            .contact-panel {
                bottom: 18px;
                width: 100%;
            }

            .whatsapp-links {
                width: calc(100% - 32px);
                justify-content: center;
            }

            .whatsapp-link {
                flex: 1;
                justify-content: center;
                padding: 9px 8px;
                font-size: 0.78rem;
            }
        }
    </style>
</head>
<body>

    <!-- Cargamos tu imagen -->

    <h1 class="hero-title">
        <img loading="lazy" src="MrS - Logo Original.png" alt="Mr. STREAM" class="bg-image" style="max-width: 100%; height: auto;">
        <span>Tecnolog&iacute;a sin l&iacute;mites</span>
    </h1>

    <a class="catalog-button" href="laptops/index.html">Ver cat&aacute;logo de laptops</a>
    <div class="contact-panel">
        <div class="contact-title">Cont&aacute;ctanos</div>
        <div class="whatsapp-links">
            <a class="whatsapp-link" href="https://wa.me/584149295884" target="_blank" rel="noopener" aria-label="Contactar por WhatsApp al +58 414 9295884">
                <span class="whatsapp-icon" aria-hidden="true">W</span>
                <span>+58 414 9295884</span>
            </a>
            <a class="whatsapp-link" href="https://wa.me/584126335854" target="_blank" rel="noopener" aria-label="Contactar por WhatsApp al +58 412 6335854">
                <span class="whatsapp-icon" aria-hidden="true">W</span>
                <span>+58 412 6335854</span>
            </a>
        </div>
    </div>

</body>
</html>
