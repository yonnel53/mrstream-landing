<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. STREAM - Tecnología sin límites</title>
    <style>
        html,
        body {
            min-width: 0;
            max-width: 100vw;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            max-width: 100vw;
            overflow-x: hidden;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
            background-color: #000; /* Fondo negro por si tarda en cargar la imagen */
            display: flex;
            justify-content: center;
            align-items: center;
                    position: relative;
        }
        .bg-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Mantiene la proporción de la imagen sin recortarla */
            max-width: 100%;
            max-height: 100%;
            background: rgba(15, 23, 42, 0.92);
            padding: 14px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
        }
    </style>
</head>
<body>

    <!-- Cargamos tu imagen -->
    <img loading="lazy" src="imagen.jpeg" alt="Mr. STREAM" class="bg-image">

</body>
</html>
