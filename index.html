<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr. STREAM - Tecnología sin límites</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Fondo negro por si tarda en cargar la imagen */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .bg-image {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Mantiene la proporción de la imagen sin recortarla */
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>

    <!-- Cargamos tu imagen -->
    <img src="imagen.jpeg" alt="Mr. STREAM" class="bg-image">

</body>
</html>
